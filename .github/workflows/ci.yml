name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Validate OpenClaw plugin
        run: npm run plugin:validate

      - name: Check npm package contents
        run: npm pack --dry-run
